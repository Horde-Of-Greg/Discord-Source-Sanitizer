name: PR Checks

on:
    pull_request:

concurrency:
    group: pr-checks-${{ github.ref }}
    cancel-in-progress: false

jobs:
    pr-checks:
        runs-on: ubuntu-latest
        permissions:
            actions: none
            checks: write
            contents: read
            issues: none
            pull-requests: none

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Create the output directory
              run: mkdir -p temp/lint

            - name: Install dependencies
              run: npm ci

            - name: Compilation Check
              run: npm run tscheck

            - name: Run ESLint with JSON report
              run: npm run lint

            - name: Run Vitest
              run: npm run test
